  const ITEMS_PER_PAGE = 3;
  let currentPage = 1;
  const totalPages = Math.ceil(articlesDatabase.length / ITEMS_PER_PAGE);

  function renderArticles(page) {
    const start = (page - 1) * ITEMS_PER_PAGE;
    const end = start + ITEMS_PER_PAGE;
    const pageArticles = articlesDatabase.slice(start, end);
    const container = document.getElementById('articles-list-container');
    if (!container) return;
    if (pageArticles.length === 0) { container.innerHTML = '<div style="text-align:center; padding: 40px;">Статьи не найдены</div>'; return; }
    let html = '';
    pageArticles.forEach((article, index) => {
      html += `
        <div class="article-preview" style="animation-delay: ${index * 0.1}s;">
          <div class="article-meta">
            <span>${article.dateFormatted}</span>
            <span>👁️ ${article.views}</span>
          </div>
          <div class="article-content">
            <h3>${article.title}</h3>
            <p>${article.description}</p>
            <a href="${article.link}" class="article-link">Читать полностью →</a>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  function renderPagination() {
    const container = document.getElementById('pagination-container');
    if (!container) return;
    if (totalPages <= 1) { container.innerHTML = ''; return; }
    let html = '';
    if (currentPage === 1) html += `<a class="disabled">← Назад</a>`;
    else html += `<a onclick="goToPage(${currentPage - 1})">← Назад</a>`;
    for (let i = 1; i <= totalPages; i++) {
      if (i === currentPage) html += `<a class="active">${i}</a>`;
      else html += `<a onclick="goToPage(${i})">${i}</a>`;
    }
    if (currentPage === totalPages) html += `<a class="disabled">Вперёд →</a>`;
    else html += `<a onclick="goToPage(${currentPage + 1})">Вперёд →</a>`;
    container.innerHTML = html;
  }

  window.goToPage = function(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderArticles(currentPage);
    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  renderArticles(1);
  renderPagination();
