<script>
  fetch('/header.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('header-placeholder').innerHTML = data;
      setTimeout(() => {
        const navLinks = document.querySelectorAll('.nav-links a');
        navLinks.forEach(link => {
          if (link.getAttribute('href') && link.getAttribute('href').includes('/blog/')) {
            link.classList.add('active');
          }
        });
        const burger = document.getElementById('burgerBtn');
        const nav = document.getElementById('navLinks');
        if (burger && nav) {
          burger.addEventListener('click', () => {
            burger.classList.toggle('active');
            nav.classList.toggle('active');
            document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : '';
          });
          nav.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
              burger.classList.remove('active');
              nav.classList.remove('active');
              document.body.style.overflow = '';
            });
          });
          window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
              burger.classList.remove('active');
              nav.classList.remove('active');
              document.body.style.overflow = '';
            }
          });
        }
      }, 100);
    })
    .catch(() => {
      document.getElementById('header-placeholder').innerHTML = '<header style="padding:20px 0;background:#0C0C0C;border-bottom:1px solid #3A86FF33;text-align:center;"><a href="/" style="color:#fff;font-size:1.5rem;letter-spacing:0.3em;"><span style="color:#3A86FF;">А</span>МЕЙСТЕР</a></header>';
    });
</script>

    if (!container) return;
    
    if (pageArticles.length === 0) {
      container.innerHTML = '<div style="text-align:center; padding: 40px;">Статьи не найдены</div>';
      return;
    }
    
    let html = '';
    pageArticles.forEach((article, index) => {
      html += `
        <div class="article-preview" style="animation-delay: ${index * 0.1}s;">
          <div class="article-meta">
            <span>${article.dateFormatted}</span>
            <span>👁️ ${article.views}</span>
          </div>
          <div class="article-content">
            <h3>${article.title}</h3>
            <p>${article.description}</p>
            <a href="${article.link}" class="article-link">Читать полностью →</a>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  function renderPagination() {
    const container = document.getElementById('pagination-container');
    if (!container) return;
    
    if (totalPages <= 1) {
      container.innerHTML = '';
      return;
    }
    
    let html = '';
    
    // Кнопка "Назад"
    if (currentPage === 1) {
      html += `<a class="disabled">← Назад</a>`;
    } else {
      html += `<a onclick="goToPage(${currentPage - 1})">← Назад</a>`;
    }
    
    // Номера страниц
    for (let i = 1; i <= totalPages; i++) {
      if (i === currentPage) {
        html += `<a class="active">${i}</a>`;
      } else {
        html += `<a onclick="goToPage(${i})">${i}</a>`;
      }
    }
    
    // Кнопка "Вперёд"
    if (currentPage === totalPages) {
      html += `<a class="disabled">Вперёд →</a>`;
    } else {
      html += `<a onclick="goToPage(${currentPage + 1})">Вперёд →</a>`;
    }
    
    container.innerHTML = html;
  }

  window.goToPage = function(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderArticles(currentPage);
    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // Инициализация
  renderArticles(1);
  renderPagination();

  // Загрузка подвала
  fetch('/footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-placeholder').innerHTML = data;
    })
    .catch(() => {
      document.getElementById('footer-placeholder').innerHTML = `
        <footer class="footer">
          <div class="container">
            <div class="footer-content">
              <div class="footer-logo"><span class="text-blue">А</span>МЕЙСТЕР</div>
              <div class="social-links">
                <a href="https://t.me/meysternlp" target="_blank" rel="noopener noreferrer">Telegram</a>
                <a href="https://vk.com/meysternlp" target="_blank" rel="noopener noreferrer">VK</a>
                <a href="https://rutube.ru/channel/29916593/" target="_blank" rel="noopener noreferrer">Rutube</a>
                <a href="https://dzen.ru/89857788588" target="_blank" rel="noopener noreferrer">Дзен</a>
              </div>
            </div>
            <div class="copyright">© Андрей Мейстер · 2026</div>
          </div>
        </footer>
      `;
    });
</script>
